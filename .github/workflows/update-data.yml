name: Update KT data

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run fetch-data

      - name: Commit & push si données modifiées
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/kt-stats.json
          if git diff --cached --quiet; then
            echo "Pas de changement dans les données"
          else
            git commit -m "MAJ automatique des données KT $(date +%Y-%m-%d)"
            git push
          fi
